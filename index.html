
<!doctype html><html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111318"><meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="ふたりToDo">
<title>ふたりToDo</title><link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png"><link rel="manifest" href="./manifest.webmanifest?v=20"><link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png?v=20"><link rel="apple-touch-icon-precomposed" sizes="180x180" href="./apple-touch-icon-precomposed.png?v=20"><link rel="stylesheet" href="./styles.css?v=20">
<link rel="preconnect" href="https://www.gstatic.com" crossorigin><link rel="preconnect" href="https://identitytoolkit.googleapis.com"><link rel="preconnect" href="https://securetoken.googleapis.com">
</head><body>
<header class="app-header"><div><h1>ふたりToDo</h1><p id="syncStatus" class="sync-status" data-state="loading">前回のリストを表示中</p></div><div class="header-actions"><button id="changeUserButton" class="header-button" type="button" aria-label="利用者を変更">👤</button></div></header>
<main class="app-main">
<section id="userChooser" class="user-chooser" hidden><p>この端末を使う人</p><div class="user-options"><button type="button" data-user="まさぴ">まさぴ</button><button type="button" data-user="ゆなぴ">ゆなぴ</button></div></section>
<nav class="filters" aria-label="表示フィルター"><button type="button" data-filter="all">すべて</button><button type="button" data-filter="self">自分</button><button type="button" data-filter="other">相手</button></nav>
<section class="todo-section"><div class="section-title"><h2>未完了</h2><span id="activeCount">0</span></div><ul id="activeList" class="todo-list"></ul><p id="activeEmpty" class="empty-message">未完了のToDoはありません</p></section>
<section class="todo-section"><button id="completedToggle" class="section-title section-toggle" type="button"><span class="section-title-left"><span class="section-heading">完了済み</span><span id="completedCount">0</span></span><span id="completedChevron">▾</span></button><div id="completedBody"><ul id="completedList" class="todo-list"></ul><p id="completedEmpty" class="empty-message">完了済みのToDoはありません</p></div></section>
</main>
<footer class="composer"><form id="todoForm"><input id="todoInput" type="text" maxlength="160" autocomplete="off" placeholder="やることを追加"><button id="addButton" type="submit">追加</button></form></footer>

<div id="editDialog" class="edit-dialog" hidden>
  <div class="edit-backdrop" data-edit-cancel></div>
  <form id="editForm" class="edit-panel" role="dialog" aria-modal="true" aria-labelledby="editTitle">
    <h2 id="editTitle">ToDoを編集</h2>
    <input id="editInput" type="text" maxlength="160" autocomplete="off" aria-label="ToDoの内容">
    <div class="edit-actions">
      <button id="editCancelButton" type="button">キャンセル</button>
      <button id="editSaveButton" type="submit">保存</button>
    </div>
  </form>
</div>

<template id="todoTemplate"><li class="todo-shell">
<div class="swipe-action swipe-action-complete"><button class="complete-action-button" type="button">完了</button></div>
<div class="swipe-action swipe-action-delete"><button class="delete-action-button" type="button">削除</button></div>
<div class="todo-item"><input class="todo-check" type="checkbox" aria-label="完了状態"><button class="todo-content" type="button"><span class="todo-text"></span><span class="todo-meta"><span class="author-badge"></span></span></button><button class="drag-handle" type="button" aria-label="並び替え"><span aria-hidden="true">⋮⋮</span></button></div>
</li></template>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script><script type="module" src="./app.js?v=20"></script></body></html>
